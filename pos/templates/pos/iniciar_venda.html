{% extends 'pos/base_pos.html' %}

{% block pos_title %}Nova Venda{% endblock %}

{% block pos_content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="{{ form.cliente.id_for_label }}">Cliente (opcional)</label>
                {{ form.cliente }}
                {% if form.cliente.errors %}
                <div class="invalid-feedback">
                    {{ form.cliente.errors }}
                </div>
                {% endif %}
            </div>
            
            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary">Iniciar Venda</button>
                <a href="{% url 'pos:lista_vendas' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
